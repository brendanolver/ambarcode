<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM Barcode — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .header { background: #1a1a1a; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header a { color: #888; font-size: 13px; text-decoration: none; margin-left: auto; }
    .header a:hover { color: #fff; }
    .container { max-width: 500px; margin: 0 auto; padding: 24px; }

    .section { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 20px; }
    .section h2 { font-size: 16px; margin-bottom: 4px; }
    .section p { font-size: 13px; color: #666; margin-bottom: 16px; }
    .section select { padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; background: #fff; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #16a34a; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 200; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Settings</h1>
    <a href="/">&larr; Back to printing</a>
  </div>

  <div class="container">
    <div class="section">
      <h2>My Station</h2>
      <p>Select which printer this computer sends labels to. This is remembered per browser.</p>
      <select id="myStation"></select>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    async function init() {
      const printers = await fetch('/api/printers').then(r => r.json());
      const sel = document.getElementById('myStation');
      const saved = localStorage.getItem('am_station') || '';

      if (!printers.length) {
        sel.innerHTML = '<option value="">No printers found</option>';
        return;
      }

      sel.innerHTML = printers.map(p =>
        `<option value="${p.id}" ${p.id.toString() === saved ? 'selected' : ''}>${p.computer} — ${p.name}</option>`
      ).join('');

      sel.addEventListener('change', () => {
        localStorage.setItem('am_station', sel.value);
        showToast('Station saved');
      });
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 2000);
    }

    init();
  </script>
</body>
</html>
